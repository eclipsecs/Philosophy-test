<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Философия — Тест</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#1a1209;--paper:#f5f0e8;--paper-dark:#ede7d9;--accent:#8b3a0f;--gold:#c9953a;--correct:#2d5a27;--correct-bg:#e8f5e4;--wrong:#8b1a1a;--wrong-bg:#fbeaea;--muted:#6b5d4f;--border:rgba(139,90,43,0.18)}
*{margin:0;padding:0;box-sizing:border-box}
body{background-color:var(--paper);background-image:radial-gradient(ellipse at 20% 10%,rgba(201,149,58,.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 90%,rgba(139,58,15,.06) 0%,transparent 50%);font-family:'DM Sans',sans-serif;color:var(--ink);min-height:100vh;display:flex;flex-direction:column}
header{padding:2rem 2rem 0;text-align:center}
.hline{height:1px;background:linear-gradient(to right,transparent,var(--gold),var(--accent),var(--gold),transparent);margin:.4rem auto;width:300px;opacity:.6}
h1{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,4vw,2.8rem);font-weight:700;color:var(--accent);line-height:1.1}
h1 span{color:var(--ink);font-weight:400}
.hsub{font-size:.75rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin:.3rem 0 .5rem;font-weight:500}
main{flex:1;max-width:740px;width:100%;margin:1.5rem auto;padding:0 1.2rem 3rem}

/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:1.5rem;background:var(--paper-dark);padding:4px;border-radius:4px;border:1px solid var(--border)}
.tab{flex:1;padding:8px 12px;background:transparent;border:none;border-radius:3px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;color:var(--muted);cursor:pointer;letter-spacing:.04em;transition:all .18s}
.tab:hover{color:var(--ink)}
.tab.active{background:#fff;color:var(--accent);box-shadow:0 1px 4px rgba(139,58,15,.12)}

/* PROGRESS */
.prog-wrap{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem}
.prog-track{flex:1;height:3px;background:var(--border);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(to right,var(--gold),var(--accent));border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.prog-lbl{font-size:.75rem;color:var(--muted);letter-spacing:.05em;white-space:nowrap;font-weight:500}

/* CARD */
.card{background:rgba(255,252,245,.92);border:1px solid var(--border);border-radius:2px;padding:1.8rem 2rem;position:relative;box-shadow:0 2px 30px rgba(139,58,15,.07),0 1px 0 rgba(255,255,255,.8) inset;animation:cardIn .3s cubic-bezier(.4,0,.2,1)}
.card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(to bottom,var(--gold),var(--accent));border-radius:2px 0 0 2px}
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.qmeta{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.qnum{font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:500}
.scorechi{font-size:.7rem;color:var(--muted)}
.qtext{font-family:'Playfair Display',serif;font-size:clamp(1rem,2.5vw,1.18rem);font-weight:400;line-height:1.55;color:var(--ink);margin-bottom:1.5rem}

/* OPTIONS */
.opts{display:flex;flex-direction:column;gap:8px}
.opt{display:flex;align-items:flex-start;gap:12px;padding:11px 14px;background:transparent;border:1px solid var(--border);border-radius:2px;cursor:pointer;text-align:left;font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--ink);line-height:1.4;transition:all .15s;width:100%}
.opt:hover:not(:disabled){background:rgba(201,149,58,.06);border-color:rgba(201,149,58,.4);transform:translateX(2px)}
.oltr{flex-shrink:0;width:20px;height:20px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:500;color:var(--muted);transition:all .15s;margin-top:1px}
.opt:hover:not(:disabled) .oltr{border-color:var(--gold);color:var(--gold)}
.opt.sel{background:rgba(201,149,58,.08);border-color:var(--gold)}
.opt.sel .oltr{background:var(--gold);border-color:var(--gold);color:#fff}
.opt.cor{background:var(--correct-bg);border-color:var(--correct);pointer-events:none}
.opt.cor .oltr{background:var(--correct);border-color:var(--correct);color:#fff}
.opt.wrg{background:var(--wrong-bg);border-color:var(--wrong);pointer-events:none}
.opt.wrg .oltr{background:var(--wrong);border-color:var(--wrong);color:#fff}
.opt.rev{background:var(--correct-bg);border-color:var(--correct);pointer-events:none}
.opt.rev .oltr{background:var(--correct);border-color:var(--correct);color:#fff}
.opt:disabled{cursor:default}

/* FEEDBACK */
.fb{margin-top:1rem;padding:9px 13px;border-radius:2px;font-size:.84rem;font-weight:500;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.fb.ok{background:var(--correct-bg);color:var(--correct);border-left:3px solid var(--correct)}
.fb.no{background:var(--wrong-bg);color:var(--wrong);border-left:3px solid var(--wrong)}

/* NAV */
.nav{display:flex;align-items:center;justify-content:space-between;margin-top:1.5rem;gap:10px}
.btn{padding:9px 20px;border-radius:2px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .15s;letter-spacing:.04em}
.btn:hover{background:var(--paper-dark);color:var(--ink)}
.btn.pri{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.pri:hover{background:#a0461a}
.btn:disabled{opacity:.35;cursor:default}

/* RESULTS */
.res-wrap{text-align:center;animation:cardIn .4s ease}
.ring-wrap{width:130px;height:130px;margin:0 auto 1.2rem;position:relative}
.ring-wrap svg{transform:rotate(-90deg)}
.rbg{fill:none;stroke:var(--border);stroke-width:8}
.rfill{fill:none;stroke:var(--accent);stroke-width:8;stroke-linecap:round}
.ring-txt{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.rpct{font-family:'Playfair Display',serif;font-size:1.9rem;font-weight:700;color:var(--accent);display:block;line-height:1}
.rlbl{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.rtitle{font-family:'Playfair Display',serif;font-size:1.4rem;margin-bottom:.3rem}
.rsub{font-size:.85rem;color:var(--muted);margin-bottom:1.5rem}
.srow{display:flex;gap:10px;justify-content:center;margin-bottom:1.5rem;flex-wrap:wrap}
.sbox{background:rgba(255,252,245,.9);border:1px solid var(--border);border-radius:2px;padding:12px 20px;text-align:center;min-width:80px}
.snum{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;display:block;line-height:1}
.snum.c{color:var(--correct)}.snum.w{color:var(--wrong)}
.slbl{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.rbtns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:2rem}

/* REVIEW */
.rev-hdr{font-family:'Playfair Display',serif;font-size:1.2rem;margin-bottom:1rem;padding-bottom:.7rem;border-bottom:1px solid var(--border)}
.ri{padding:12px 14px;border-radius:2px;margin-bottom:8px;border-left:3px solid transparent}
.ri.ok{background:var(--correct-bg);border-left-color:var(--correct)}
.ri.bad{background:var(--wrong-bg);border-left-color:var(--wrong)}
.riq{font-family:'Playfair Display',serif;font-size:.9rem;margin-bottom:4px}
.riy{font-size:.78rem;color:var(--wrong);margin-bottom:2px}
.ric{font-size:.78rem;color:var(--correct);font-weight:500}

/* CHEAT SHEET */
.cs-search{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:2px;background:rgba(255,252,245,.9);font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--ink);margin-bottom:1rem;outline:none}
.cs-search:focus{border-color:var(--gold)}
.cs-filters{display:flex;gap:6px;margin-bottom:1.2rem;flex-wrap:wrap}
.csf{padding:5px 12px;border:1px solid var(--border);border-radius:99px;background:transparent;font-family:'DM Sans',sans-serif;font-size:.75rem;color:var(--muted);cursor:pointer;transition:all .15s}
.csf:hover,.csf.on{background:var(--accent);border-color:var(--accent);color:#fff}
.cs-list{display:flex;flex-direction:column;gap:6px}
.cs-item{background:rgba(255,252,245,.9);border:1px solid var(--border);border-radius:2px;padding:10px 14px;cursor:pointer;transition:all .15s}
.cs-item:hover{border-color:var(--gold);background:rgba(201,149,58,.04)}
.cs-item.open{border-color:var(--gold)}
.cs-q{font-family:'Playfair Display',serif;font-size:.88rem;color:var(--ink);line-height:1.45;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.cs-q .qn{color:var(--gold);font-size:.75rem;font-weight:500;white-space:nowrap;margin-top:2px}
.cs-ans{margin-top:8px;padding:7px 10px;background:var(--correct-bg);border-left:3px solid var(--correct);border-radius:1px;font-size:.83rem;color:var(--correct);font-weight:500;display:none}
.cs-item.open .cs-ans{display:block}
.cs-arrow{font-size:.7rem;color:var(--muted);transition:transform .2s;flex-shrink:0;margin-top:3px}
.cs-item.open .cs-arrow{transform:rotate(180deg)}

/* SPLASH */
.splash{text-align:center;padding:.5rem 0 2rem;animation:cardIn .4s ease}
.splash-ico{font-size:2.5rem;margin-bottom:.4rem;opacity:.7}
.splash h2{font-family:'Playfair Display',serif;font-size:1.4rem;margin-bottom:.4rem}
.splash p{font-size:.87rem;color:var(--muted);margin-bottom:1.8rem;line-height:1.6;max-width:440px;margin-left:auto;margin-right:auto}
.splash-stats{display:flex;justify-content:center;gap:2rem;margin-bottom:2rem}
.ss-num{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;color:var(--accent);display:block}
.ss-lbl{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.ornament{text-align:center;color:var(--gold);font-size:.9rem;letter-spacing:.5em;margin:1.2rem 0;opacity:.4}

/* FLASHCARD */
.fc-wrap{perspective:1000px;margin-bottom:1.5rem}
.fc{width:100%;min-height:200px;position:relative;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1);cursor:pointer}
.fc.flipped{transform:rotateY(180deg)}
.fc-front,.fc-back{position:absolute;width:100%;min-height:200px;backface-visibility:hidden;background:rgba(255,252,245,.92);border:1px solid var(--border);border-radius:2px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;box-shadow:0 2px 30px rgba(139,58,15,.07)}
.fc-front::before,.fc-back::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;border-radius:2px 0 0 2px}
.fc-front::before{background:linear-gradient(to bottom,var(--gold),var(--accent))}
.fc-back::before{background:linear-gradient(to bottom,var(--correct),#1a4a15)}
.fc-back{transform:rotateY(180deg);background:var(--correct-bg)}
.fc-hint{font-size:.68rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:.8rem}
.fc-q{font-family:'Playfair Display',serif;font-size:clamp(1rem,2.5vw,1.15rem);color:var(--ink);line-height:1.5}
.fc-a{font-family:'Playfair Display',serif;font-size:clamp(1.05rem,2.5vw,1.2rem);color:var(--correct);font-weight:500;line-height:1.4}
.fc-nav{display:flex;align-items:center;gap:12px;justify-content:center}
.fc-counter{font-size:.78rem;color:var(--muted);min-width:70px;text-align:center}

@media(max-width:520px){main{padding:0 .8rem 3rem}.card{padding:1.3rem 1.1rem}}
</style>
</head>
<body>
<header>
  <div class="hline"></div>
  <div class="hsub">Подготовка к экзамену • 228 вопросов</div>
  <h1>Фалсафа <span>/ Философия</span></h1>
  <div class="hline" style="margin-top:.5rem"></div>
</header>
<main id="app"></main>
<script>
const Q=[[`Идеи какого направления в философии получили чёткое выражение в деятельности «Венского кружка»?`,`неопозитивизм`,`философия жизни`,`экзистенциализм`,`постмодернизм`],[`Представителем философии эпохи Возрождения является:`,`Н. Кузанский`,`Эпикур`,`П. Абеляр`,`Р. Декарт`],[`Идея антропоцентризма принадлежит эпохе`,`Возрождения`,`Просвещения`,`Средневековья`,`Нового времени`],[`Что являлось центральной проблемой в философии Н. Кузанского:`,`учёное незнание`,`рациональное познание`,`теория двойственной истины`,`учение о монадах`],[`Философ Нового времени, который ввел термин «монада» как духовную единицу бытия:`,`Лейбниц`,`Бэкон`,`Локк`,`Гоббс`],[`О характере изменений мира в целом учит:`,`диалектика`,`биология`,`химия`,`астрономия`],[`Принцип «двойственной истины» заключает в себе:`,`разделение научной и религиозной истин`,`представление об относительности истины`,`представление о Боге как источнике знания`,`представление о том, что любое суждение может быть истинным и ложным`],[`Ф. Бекон различает четыре вида идола или призраков. Определите, что не относится к идолам, признакам?`,`Идолы Вселенной`,`Идолы пещеры`,`Идолы площади`,`Идолы рода`],[`О врожденных идеях было изложено в философии рационализма 17 в.`,`Декартом`,`Лейбницем`,`Спинозой`,`Бэконом`],[`Понятие субстанции характерно для философии:`,`Р. Декарта`,`М. Хайдеггера`,`A. Камю`,`Лао-цзы`],[`Основным методом получения истинных фактов считал дедукцию:`,`Р. Декарт`,`Мальбранш`,`Ф. Бэкон`,`Дж. Локк`],[`Проблему онтологии Р. Декарт решает:`,`дуалистически`,`монистически`,`плюралистически`,`архаически`],[`«Я мыслю, следовательно, существую». Кто автор изречения?`,`Р. Декарт`,`Г. Гегель`,`Аль – Фараби`,`Аль – Кинди`],[`Учение о единой субстанции разработал:`,`Б. Спиноза`,`Т. Гоббс`,`Дж. Бекон`,`Дж. Локк`],[`Основным методом получения истинных фактов в "Новом Органоне" считал индукцию:`,`Ф. Бэкон`,`Б. Паскаль`,`Р. Декарт`,`Дж. Локк`],[`«Оно», «Я» и «сверх-Я» - понятия:`,`фрейдизма`,`феноменологии`,`структу // Q[i] = [question, correct_answer, wrong1, wrong2, wrong3]
const L=['А','Б','В','Г'];
function sh(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]]}return r}

const S={screen:'splash',tab:'quiz',qs:[],cur:0,ans:[],sub:[],showRev:false,
  fcIdx:0,fcFlipped:false,fcSeen:new Set(),
  csQuery:'',csFilter:'all',csOpen:-1};

function startQuiz(){
  S.screen='quiz';S.tab='quiz';
  S.qs=sh(Q).slice(0,20).map(q=>({q:q[0],a:q[1],shuffled:sh([q[1],q[2],q[3],q[4]])}));
  S.cur=0;S.ans=new Array(20).fill(null);S.sub=new Array(20).fill(false);S.showRev=false;
  render()
}

function render(){
  const app=document.getElementById('app');
  if(S.screen==='splash'){renderSplash(app);return}
  // tabs
  let tabHtml=`<div class="tabs">
    <button class="tab${S.tab==='quiz'?' active':''}" onclick="switchTab('quiz')">📝 Тест (20 вопросов)</button>
    <button class="tab${S.tab==='flash'?' active':''}" onclick="switchTab('flash')">🃏 Карточки</button>
    <button class="tab${S.tab==='cheat'?' active':''}" onclick="switchTab('cheat')">📖 Шпаргалка</button>
  </div>`;
  app.innerHTML=tabHtml+'<div id="panel"></div>';
  const panel=document.getElementById('panel');
  if(S.tab==='quiz'){if(S.showRev)renderReview(panel);else if(S.screen==='results')renderResults(panel);else renderQuestion(panel)}
  else if(S.tab==='flash')renderFlash(panel);
  else renderCheat(panel);
}

window.switchTab=t=>{S.tab=t;render()}

function renderSplash(app){
  app.innerHTML=`<div class="splash">
    <div class="splash-ico">⚡</div>
    <h2>Готовы к тесту по философии?</h2>
    <p>Три режима подготовки: случайный тест, карточки для запоминания и полная шпаргалка со всеми ответами.</p>
    <div class="splash-stats">
      <div><span class="ss-num">228</span><span class="ss-lbl">Вопросов</span></div>
      <div><span class="ss-num">20</span><span class="ss-lbl">В тесте</span></div>
      <div><span class="ss-num">3</span><span class="ss-lbl">Режима</span></div>
    </div>
    <button class="btn pri" onclick="startQuiz()" style="font-size:.95rem;padding:11px 32px">Начать тест →</button>
    <div class="ornament">· · · · ·</div>
    <button class="btn" onclick="S.screen='quiz';S.tab='flash';render()" style="margin-right:8px">🃏 Карточки</button>
    <button class="btn" onclick="S.screen='quiz';S.tab='cheat';render()">📖 Шпаргалка</button>
  </div>`
}

function renderQuestion(panel){
  const q=S.qs[S.cur],sub=S.sub[S.cur],chosen=S.ans[S.cur];
  const pct=Math.round(S.cur/20*100);
  const corr=S.ans.filter((a,i)=>a===S.qs[i]?.a).length;
  let optsH='';
  q.shuffled.forEach((o,i)=>{
    let c='opt';
    if(sub){if(o===q.a)c+=' cor';else if(o===chosen)c+=' wrg';}
    else if(o===chosen)c+=' sel';
    optsH+=`<button class="${c}" onclick="sel(${i})" ${sub?'disabled':''}><span class="oltr">${L[i]}</span>${o}</button>`
  });
  let fb='';
  if(sub)fb=`<div class="fb ${chosen===q.a?'ok':'no'}">${chosen===q.a?'✓ Правильно!':'✗ Неверно. Правильный ответ: '+q.a}</div>`;
  let nav=`<div class="nav">`;
  if(S.cur>0)nav+=`<button class="btn" onclick="go(-1)">← Назад</button>`;else nav+=`<div></div>`;
  if(!sub&&chosen!==null)nav+=`<button class="btn pri" onclick="check()">Проверить</button>`;
  else if(sub){
    if(S.cur<19)nav+=`<button class="btn pri" onclick="go(1)">Далее →</button>`;
    else nav+=`<button class="btn pri" onclick="finish()">Результаты →</button>`;
  }else nav+=`<div></div>`;
  nav+=`</div>`;
  panel.innerHTML=`
    <div class="prog-wrap"><div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div><span class="prog-lbl">${S.cur+1}/20 · ✓${corr}</span></div>
    <div class="card"><div class="qmeta"><span class="qnum">Вопрос ${S.cur+1}</span></div><div class="qtext">${q.q}</div><div class="opts">${optsH}</div>${fb}</div>${nav}`
}

window.sel=i=>{if(S.sub[S.cur])return;S.ans[S.cur]=S.qs[S.cur].shuffled[i];render()};
window.check=()=>{S.sub[S.cur]=true;render()};
window.go=d=>{S.cur=Math.max(0,Math.min(19,S.cur+d));render()};
window.finish=()=>{S.screen='results';render()};

function renderResults(panel){
  const c=S.ans.filter((a,i)=>a===S.qs[i]?.a).length;
  const p=Math.round(c/20*100);
  const g=p>=90?'Отлично! 🏆':p>=75?'Хорошо! 👍':p>=55?'Неплохо, продолжайте 📚':'Нужно больше практики 💪';
  const circ=2*Math.PI*54,off=circ-(p/100)*circ;
  panel.innerHTML=`<div class="res-wrap">
    <div class="ring-wrap"><svg width="130" height="130" viewBox="0 0 130 130"><circle class="rbg" cx="65" cy="65" r="54"/><circle class="rfill" cx="65" cy="65" r="54" stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"/></svg>
    <div class="ring-txt"><span class="rpct">${p}%</span><span class="rlbl">Результат</span></div></div>
    <div class="rtitle">${g}</div><div class="rsub">${c} из 20 правильных</div>
    <div class="srow">
      <div class="sbox"><span class="snum c">${c}</span><span class="slbl">Верно</span></div>
      <div class="sbox"><span class="snum w">${20-c}</span><span class="slbl">Неверно</span></div>
      <div class="sbox"><span class="snum">20</span><span class="slbl">Всего</span></div>
    </div>
    <div class="rbtns">
      <button class="btn" onclick="showRev()">Разбор ошибок</button>
      <button class="btn pri" onclick="startQuiz()">Новый тест ↺</button>
    </div>
  </div>`
}

window.showRev=()=>{S.showRev=true;render()};
function renderReview(panel){
  let items='';
  S.qs.forEach((q,i)=>{
    const ok=S.ans[i]===q.a;
    items+=`<div class="ri ${ok?'ok':'bad'}"><div class="riq">${i+1}. ${q.q}</div>${!ok?`<div class="riy">Ваш: ${S.ans[i]||'—'}</div>`:''}
    <div class="ric">✓ ${q.a}</div></div>`
  });
  panel.innerHTML=`<div class="card"><div class="rev-hdr">Разбор ответов</div>${items}
    <div class="nav" style="justify-content:center;gap:10px;margin-top:1.2rem">
      <button class="btn" onclick="S.showRev=false;render()">← Результаты</button>
      <button class="btn pri" onclick="startQuiz()">Новый тест ↺</button>
    </div></div>`
}

// FLASHCARDS
function renderFlash(panel){
  const idx=S.fcIdx%Q.length;
  const q=Q[idx];
  const total=Q.length;
  const seen=S.fcSeen.size;
  panel.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem">
      <span style="font-size:.75rem;color:var(--muted);letter-spacing:.05em">Просмотрено: ${seen}/${total}</span>
      <button class="btn" onclick="S.fcSeen.clear();S.fcIdx=0;S.fcFlipped=false;render()" style="font-size:.75rem;padding:5px 12px">Сбросить</button>
    </div>
    <div class="fc-wrap" onclick="flipCard()">
      <div class="fc${S.fcFlipped?' flipped':''}" id="fc">
        <div class="fc-front">
          <div class="fc-hint">Вопрос ${idx+1} из ${total} · нажмите чтобы открыть</div>
          <div class="fc-q">${q[0]}</div>
        </div>
        <div class="fc-back">
          <div class="fc-hint">Ответ</div>
          <div class="fc-a">${q[1]}</div>
        </div>
      </div>
    </div>
    <div class="fc-nav">
      <button class="btn" onclick="fcGo(-1)" ${idx===0?'disabled':''}>← Пред.</button>
      <span class="fc-counter">${idx+1} / ${total}</span>
      <button class="btn pri" onclick="fcGo(1)">След. →</button>
    </div>
    <div style="text-align:center;margin-top:1rem">
      <button class="btn" onclick="S.fcIdx=Math.floor(Math.random()*Q.length);S.fcFlipped=false;render()" style="font-size:.8rem">🎲 Случайная</button>
    </div>`
}
window.flipCard=()=>{S.fcFlipped=!S.fcFlipped;S.fcSeen.add(S.fcIdx%Q.length);render()};
window.fcGo=d=>{S.fcIdx=Math.max(0,Math.min(Q.length-1,S.fcIdx+d));S.fcFlipped=false;render()};

// CHEAT SHEET
function renderCheat(panel){
  const q=S.csQuery.toLowerCase();
  const filt=S.csFilter;
  let items=Q.map((x,i)=>({i,q:x[0],a:x[1]}));
  if(q)items=items.filter(x=>x.q.toLowerCase().includes(q)||x.a.toLowerCase().includes(q));
  const total=items.length;
  panel.innerHTML=`
    <input class="cs-search" placeholder="Поиск по вопросу или ответу..." value="${S.csQuery}" oninput="S.csQuery=this.value;render()">
    <div style="font-size:.75rem;color:var(--muted);margin-bottom:.8rem">Найдено: ${total} вопросов · нажмите на вопрос, чтобы увидеть ответ</div>
    <div class="cs-list">${items.map(x=>`
      <div class="cs-item${S.csOpen===x.i?' open':''}" onclick="S.csOpen=S.csOpen===${x.i}?-1:${x.i};render()">
        <div class="cs-q"><span>${x.q}</span><span style="display:flex;align-items:center;gap:6px"><span class="qn">#${x.i+1}</span><span class="cs-arrow">▼</span></span></div>
        <div class="cs-ans">✓ ${x.a}</div>
      </div>`).join('')}
    </div>`
}

render();
</script>
